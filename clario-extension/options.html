<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>clarionot Clip - Ayarlar</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Arial;
        padding: 16px;
        max-width: 520px;
      }
      button {
        padding: 10px 14px;
        margin-top: 10px;
        cursor: pointer;
      }
      .muted {
        color: #666;
        font-size: 12px;
        margin-top: 6px;
      }
      .ok {
        color: #0a7;
        margin-top: 10px;
      }
      .err {
        color: #c00;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>clarionot Clip</h2>
    <p class="muted">
      Token otomatik yönetilir. Bağlı değilse ilk “Kaydet” denemesinde
      clarionot'ya yönlendirilirsin.
    </p>

    <div id="status"></div>

    <button id="connect">clarionot'ya Git</button>
    <button id="reset">Bağlantıyı Sıfırla</button>

    <script src="options.js"></script>
  </body>
</html>
